name: Actualizar Portafolio

on:
  push:
    paths:
      - 'portafolio/KPIS para dashboard ejecutivo.xlsx'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout pmo-hub
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Generar portafolio/index.html
        run: python portafolio/generate_dashboard.py

      - name: Publicar HTML actualizado
        run: |
          git config user.name  "PMO Dashboard Bot"
          git config user.email "bot@censys-pmo-hub.local"
          git add portafolio/index.html
          git diff --cached --quiet && echo "Sin cambios." || \
            (git commit -m "dashboard: portafolio actualizado $(date '+%Y-%m-%d %H:%M UTC')" \
             && git push origin main)
